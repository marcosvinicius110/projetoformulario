<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Venda seu carro</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <header class="cabecalho">
            <h3>Cadastre seu veículo para vender mais rápido</h3>
        </header>
        <div class="form-container">
            <div class="form-header">
                <p>Formulário</p>
            </div>
        </div>
        <div class="form-body">
            <h1 class="titulo-form">Venda fácil seu carro</h1>
            <p>Descreva as características do seu carro e marque os adicionais que ele possui</p>
            <form>
                <div class="caixaInputs">
                    <label for="title">Título do anúncio <span class="obrigatorio">*</span></label>
                    <input type="text" name="title" id="title" class="block" placeholder="Digite um titúlo para o anúncio">
                </div>
                <div class="caixaInputs">
                    <label for="title">Preço <span class="obrigatorio">*</span></label>
                    <input type="number" name="preco" id="preco" class="block" placeholder="Digite um preço">
                </div>
                <div class="caixaInputs">
                    <label for="descricao">Descrição <span class="campo-obrigatorio"></span></label>
                    <textarea name="descricao" id="descricao" class="block" placeholder="Digite a descrição do seu veículo"></textarea>
                </div>
                 <div class="caixaInputs">
                    <label for="marca">Marca <span class="obrigatorio">*</span></label>
                    <input type="text" name="marca" id="marca" class="block" placeholder="Digite a marca">
                </div>
                <div class="caixaInputs">
                    <label for="modelo">modelo <span class="obrigatorio">*</span></label>
                    <input type="text" name="modelo" id="modelo" class="block" placeholder="Digite o modelo">
                </div>
                <div class="caixaInputs">
                    <label for="Kilometragem">Kilometragem<span class="obrigatorio">*</span></label>
                    <input type="number" name="kilometragem" id="kilometragem" class="block" placeholder="Digite a kilometragem">
                </div>
                <div class="caixaInputs">
                    <label for="data-compra">Data de compra <span class="obrigatorio">*</span></label>
                    <input type="date" name="date-compra" id="data-compra" class="block" placeholder="Digite o modelo">
                </div>
                <div class="caixaInputs">
                    <p>Tipo de Câmbio: <span class="campo-obrigatorio">*</span></p>
                    <input type="radio" name="marcha" id="manual">
                    <label for="manual">Manual</label>
                </div>
                <div class="caixaOpicional">
                    <p>Opcionais</p>
                    <ul class="listaOpcionais">
                        <Li>
                            <input type="checkbox" name="opcional[]" id="airbag" value="airbag">
                            label for = "airbag">Airbag</label>
                        </Li>
                        </li>
                            <input type="checkbox" name="opcional[]" id="alarme" value="alarme">
                            <label for="alarme">alarme</label>
                    </li>
                     <li>
                        <input type="checkbox" name="opcional[]" id="ar condicionado" value="ar-condicionado">
                        <label> for="arcondicionado">ar-condicionado</label>
                        </li>
                        <li>
                            <input type="checkbox" name="opcional[]" id="camera-de-re" value="camera-de-re">
                            <label for="camera-de-re">camera-de-re</label>
                        </li>
                    </ul>
                    <p>Opcionais</p>
                </div>
                  <div class="caixaOpcional">
      <ul class="listaOpcionais">

        <li>
          <input type="checkbox" name="opcional[]" id="assistente-de-pista" value="assistente-de-pista">
          <label for="assistente-de-pista">assistente-de-pista</label>
        </li>

        <li>
          <input type="checkbox" name="opcional[]" id="partida-sem-chave" value="partida-sem-chave">
          <label for="partida-sem-chave">partida-sem-chave</label>
        </li>

        <li>
          <input type="checkbox" name="opcional[]" id="integracao-com-celular" value="integracao-com-celular">
          <label for="integracao-com-celular">integracao-com-celular</label>
        </li>

        <li>
          <input type="checkbox" name="opcional[]" id="banco-de-couro" value="banco-de-couro">
          <label for="banco-de-couro">banco-de-couro</label>
        </li>

      </ul>

      <p>Opcionais</p>
    </div>

      </form>
    </div>
  </div>
</body>
</html>
